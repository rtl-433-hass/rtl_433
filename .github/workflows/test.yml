name: Test

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions: {}

jobs:
  pytest:
    name: "pytest"
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: false

      # Python version comes from .python-version (tracks the Home Assistant
      # requirement); uv reads it automatically.
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install requirements
        run: |
          uv venv
          uv pip install -r requirements_test.txt

      - name: Run tests
        run: uv run pytest --cov=custom_components/rtl_433 tests/
