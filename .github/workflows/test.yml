name: Test

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions: {}

jobs:
  pytest:
    name: "pytest (Python ${{ matrix.python-version }})"
    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: false
      matrix:
        # Home Assistant 2026.4+ requires Python 3.14; older Python versions
        # are no longer supported (and pytest-homeassistant-custom-component
        # drops them too).
        python-version: ["3.14"]
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install requirements
        run: |
          uv venv
          uv pip install -r requirements_test.txt

      - name: Run tests
        run: uv run pytest --cov=custom_components/rtl_433 tests/
