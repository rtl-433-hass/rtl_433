# Humidity and moisture field mappings.
#
# Ported from the upstream rtl_433 example `rtl_433_mqtt_hass.py` `mappings`
# table. See docs/device-library.md for the schema reference.

humidity:
  platform: sensor
  device_class: humidity
  unit_of_measurement: "%"
  state_class: measurement
  name: null
  value_transform: { float: true }
  object_suffix: H

humidity_1:
  platform: sensor
  device_class: humidity
  unit_of_measurement: "%"
  state_class: measurement
  name: Humidity 1
  value_transform: { float: true }
  object_suffix: H1

humidity_2:
  platform: sensor
  device_class: humidity
  unit_of_measurement: "%"
  state_class: measurement
  name: Humidity 2
  value_transform: { float: true }
  object_suffix: H2

moisture:
  platform: sensor
  device_class: moisture
  unit_of_measurement: "%"
  state_class: measurement
  name: null
  value_transform: { float: true }
  object_suffix: M

# Water leak detector (boolean). 1 == wet.
detect_wet:
  platform: binary_sensor
  device_class: moisture
  unit_of_measurement: null
  state_class: null
  name: Water sensor
  payload: { on: "1", off: "0" }
  force_update: true
  object_suffix: moisture

# Depth measurement (e.g. snow/water depth sensors).
depth_cm:
  platform: sensor
  device_class: null
  unit_of_measurement: cm
  state_class: measurement
  name: Depth
  value_transform: { float: true }
  object_suffix: D

# --- Fine Offset / Ecowitt WH51 (also WN31, SwitchDoc Labs SM23) soil moisture ---
# Raw/diagnostic fields that sit behind the `moisture` percentage. Only the
# upstream WH51 soil-moisture decoder emits `ad_raw` and `boost`, so a flat
# (global) mapping is collision-free. See the WH51 notes in upstream
# `src/devices/fineoffset.c`.

# Raw 9-bit ADC reading (~70 dry .. ~450 wet) the sensor derives `moisture` from.
# Exposed as a diagnostic so users can recalibrate the dry/wet endpoints when the
# sensor's own percentage is inaccurate at the extremes.
ad_raw:
  platform: sensor
  device_class: null
  unit_of_measurement: null
  state_class: measurement
  name: AD raw
  value_transform: { int: true }
  entity_category: diagnostic
  object_suffix: ad_raw

# Transmission period boost: a 3-bit counter set to its max on a moisture change
# and decremented on each transmission (>0 => 10 s send period, 0 => 70 s). A
# non-zero value flags recent soil-moisture activity / a faster send cadence.
boost:
  platform: sensor
  device_class: null
  unit_of_measurement: null
  state_class: measurement
  name: Transmission boost
  value_transform: { int: true }
  entity_category: diagnostic
  object_suffix: boost
