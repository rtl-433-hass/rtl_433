# Miscellaneous field mappings: battery level, timestamp, radio signal
# diagnostics, and lightning/storm fields.
#
# Ported from the upstream rtl_433 example `rtl_433_mqtt_hass.py` `mappings`
# table. See docs/device-library.md for the schema reference.

# Battery state. rtl_433 reports a boolean-ish battery_ok (1 == OK, 0 == low).
# Upstream maps it to a battery *percentage* sensor: 0 -> 1 %, 1 -> 100 %
# via `((value * 99) round 0) + 1`. We reproduce that with scale+offset, so
# this is a sensor (not a binary_sensor). See docs/device-library.md.
battery_ok:
  platform: sensor
  device_class: battery
  unit_of_measurement: "%"
  state_class: measurement
  name: null
  value_transform: { scale: 99, offset: 1, round: 0 }
  entity_category: diagnostic
  object_suffix: B

# Device-reported timestamp. Disabled by default (diagnostic noise).
time:
  platform: sensor
  device_class: timestamp
  unit_of_measurement: null
  state_class: null
  name: null
  entity_category: diagnostic
  enabled_by_default: false
  icon: "mdi:clock-in"
  object_suffix: UTC

# Radio signal diagnostics (frequency, RSSI, SNR, noise). These are only emitted
# by rtl_433 when level reporting is on (the add-on / CLI `-M level`, i.e.
# `report_meta level`). They are surfaced as diagnostic sensors disabled by
# default — enable the ones you want per device — and simply produce no entity
# on installs whose rtl_433 does not report them.
freq:
  platform: sensor
  device_class: frequency
  unit_of_measurement: MHz
  state_class: measurement
  name: null
  value_transform: { round: 4 }
  entity_category: diagnostic
  enabled_by_default: false
  object_suffix: freq

rssi:
  platform: sensor
  device_class: signal_strength
  unit_of_measurement: dB
  state_class: measurement
  name: RSSI
  value_transform: { round: 2 }
  entity_category: diagnostic
  enabled_by_default: false
  object_suffix: rssi

snr:
  platform: sensor
  device_class: signal_strength
  unit_of_measurement: dB
  state_class: measurement
  name: SNR
  value_transform: { round: 2 }
  entity_category: diagnostic
  enabled_by_default: false
  object_suffix: snr

noise:
  platform: sensor
  device_class: signal_strength
  unit_of_measurement: dB
  state_class: measurement
  name: Noise
  value_transform: { round: 2 }
  entity_category: diagnostic
  enabled_by_default: false
  object_suffix: noise

# Lightning detector fields.
storm_dist_km:
  platform: sensor
  device_class: null
  unit_of_measurement: km
  state_class: measurement
  name: Lightning distance
  value_transform: { int: true }
  object_suffix: stdist

storm_dist:
  platform: sensor
  device_class: null
  unit_of_measurement: mi
  state_class: measurement
  name: Lightning distance
  value_transform: { int: true }
  object_suffix: stdist

strike_distance:
  platform: sensor
  device_class: null
  unit_of_measurement: mi
  state_class: measurement
  name: Lightning distance
  value_transform: { int: true }
  object_suffix: stdist

strike_count:
  platform: sensor
  device_class: null
  unit_of_measurement: null
  state_class: total_increasing
  name: Lightning strike count
  value_transform: { int: true }
  object_suffix: strcnt

# Occupancy / motion. PIR / occupancy decoders (Interlogix, Risco Agility,
# Kerui, ...) emit `motion` only ON DETECTION (raw value 1) and never send an
# off, so this is a detect-only binary_sensor: only an `on` token is declared
# and the off state is synthesized by the timer (see Rtl433BinarySensor +
# clear_delay). A non-matching value yields unknown; clear_delay drives the off.
# Raw value 1 confirmed against upstream rtl_433 PIR decoders (e.g.
# Interlogix / Risco Agility / Kerui add `"motion"` = 1 on trigger), matching
# the `1 == on` convention of the upstream rtl_433_mqtt_hass.py mappings.
motion:
  platform: binary_sensor
  device_class: occupancy
  name: Motion
  payload: { on: "1" }
  clear_delay: 90
  object_suffix: motion
  event_driven: true
