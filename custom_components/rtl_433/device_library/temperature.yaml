# Temperature field mappings.
#
# Ported from the upstream rtl_433 example `rtl_433_mqtt_hass.py` `mappings`
# table. See docs/device-library.md for the schema reference.
#
# Each entry is keyed by the rtl_433 JSON field name.

temperature_C:
  platform: sensor
  device_class: temperature
  unit_of_measurement: "°C"
  state_class: measurement
  name: null
  value_transform: { round: 1 }
  object_suffix: T

temperature_1_C:
  platform: sensor
  device_class: temperature
  unit_of_measurement: "°C"
  state_class: measurement
  name: Temperature 1
  value_transform: { round: 1 }
  object_suffix: T1

