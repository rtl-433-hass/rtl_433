# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
#
# Ruff and codespell run via pre-commit-managed hook environments, so they work
# in any local checkout (and in CI) without relying on a project virtualenv.
# Run them with `pre-commit install` (auto-runs on commit) or a one-off
# `uvx --with pre-commit-uv pre-commit run --all-files`.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      # Linter (with autofix)
      - id: ruff-check
        args: [--fix]
      # Formatter
      - id: ruff-format

  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        args: ["--ignore-words-list=hass,keep-alives,retuned", "--quiet-level=2"]
        types_or: [python, markdown, rst]
        exclude_types: [csv, json, html]
        files: ^(custom_components/|tests/|scripts/|README\.md|CONTRIBUTING\.md|AGENTS\.md)

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: mixed-line-ending
        args: [--fix=lf]
